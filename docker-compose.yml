services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: world_echo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/world_echo
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
